{% extends "base.html" %}

{% block title %}Duelo Online · Lucas Garage{% endblock %}

{% block content %}
<div class="w-full px-4 py-8 sm:px-6">
    <div class="max-w-md mx-auto">

        <header class="text-center mb-6">
            <p class="text-garage-ferrari text-[11px] font-bold tracking-[0.35em] uppercase mb-2">Duelo Online</p>
            <h1 class="font-display text-3xl font-bold">SUPER <span class="text-garage-ferrari">TRUNFO</span></h1>
            <p class="text-xs text-gray-500 mt-1">Sala <span class="text-white font-bold">{{ code }}</span> · você é o <span id="eu-sou" class="text-garage-ferrari font-bold">—</span></p>
        </header>

        <div id="area" class="min-h-[300px]">
            <p class="text-center text-gray-500 py-16">Conectando...</p>
        </div>
    </div>
</div>

<script>
const CODE = "{{ code }}";
let meuToken = localStorage.getItem('gt_' + CODE) || "";
let ultimaAssinatura = "";
let ocupado = false;

const ATTRS = [
    { key: 'velocidade', label: '⚡ Velocidade' },
    { key: 'potencia',   label: '🔧 Potência' },
    { key: 'produzidos', label: '📦 Produzidos' },
    { key: 'peso',       label: '⚖️ Peso' },
    { key: 'ano',        label: '📅 Ano' },
    { key: 'raridade',   label: '💎 Raridade' },
];

function valorAttr(key, v) {
    if (v === undefined || v === null) return '—';
    if (key === 'produzidos') {
        if (v >= 1000000) return (v / 1000000).toFixed(1).replace('.', ',') + ' mi';
        if (v >= 1000) return (v / 1000).toFixed(1).replace('.', ',') + ' mil';
        return String(v);
    }
    if (key === 'peso') return v + ' kg';
    return String(v);
}

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function fotoHTML(c){ return (c&&c.photo) ? '<img src="'+c.photo+'" class="absolute inset-0 w-full h-full object-cover">' : '<div class="absolute inset-0 flex items-center justify-center font-display text-4xl font-bold text-white/15">1:32</div>'; }

function cartaHTML(c, interativo, destaque, vencedora) {
    if (!c) return '';
    const linhas = ATTRS.map(function (a) {
        const val = valorAttr(a.key, c.stats[a.key]);
        const hl = (destaque === a.key);
        if (interativo) {
            return '<button onclick="escolher(\'' + a.key + '\')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-white/5 hover:bg-garage-ferrari active:scale-95 transition-all text-left">' +
                '<span class="text-sm font-bold">' + a.label + '</span><span class="font-display text-lg font-bold">' + val + '</span></button>';
        }
        return '<div class="flex items-center justify-between px-3 py-2 rounded-lg ' + (hl ? 'bg-garage-ferrari/25 border border-garage-ferrari' : 'bg-white/5') + '">' +
            '<span class="text-xs font-bold">' + a.label + '</span><span class="font-display text-base font-bold ' + (hl ? 'text-garage-ferrari' : '') + '">' + val + '</span></div>';
    }).join('');
    const logo = c.logo ? '<div class="absolute bottom-2 left-2 w-8 h-8 rounded-full bg-white/95 flex items-center justify-center p-1"><img src="' + c.logo + '" class="max-w-full max-h-full object-contain" onerror="this.parentElement.style.display=\'none\'"></div>' : '';
    const ring = vencedora ? 'ring-2 ring-garage-ferrari' : (c.super ? 'border border-yellow-400/60' : 'border border-white/10');
    const selo = c.super
        ? '<div class="absolute top-1.5 right-1.5 z-20 px-2 py-0.5 rounded-full bg-yellow-400 text-black font-display font-bold text-[10px] shadow-lg">👑 TRUNFO</div>'
        : (c.letra
            ? '<div class="absolute top-1.5 right-1.5 z-20 w-7 h-7 rounded-full ' +
              (String(c.letra).toUpperCase() === 'A' ? 'bg-garage-ferrari' : 'bg-black/70 border border-white/30') +
              ' flex items-center justify-center font-display font-bold text-xs text-white shadow-lg">' + esc(c.letra) + '</div>'
            : '');
    return '<div class="rounded-2xl overflow-hidden ' + ring + ' bg-garage-dark shadow-xl">' +
        '<div class="relative w-full aspect-[4/3] bg-gradient-to-br from-garage-graphite to-black overflow-hidden">' + fotoHTML(c) + logo + selo +
        '<div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div></div>' +
        '<div class="p-3"><h3 class="font-display text-sm font-bold line-clamp-1">' + esc(c.name) + '</h3>' +
        '<p class="text-[10px] text-gray-400 uppercase tracking-wider mb-2">' + esc(c.mfr || '—') + '</p>' +
        '<div class="space-y-1.5">' + linhas + '</div></div></div>';
}

function placarHTML(s) {
    const chips = s.players.map(function (p, i) {
        const ativo = (i === s.chooser && s.phase !== 'over');
        const cls = p.out ? 'bg-white/5 text-gray-600 line-through' : (ativo ? 'bg-garage-ferrari text-white' : 'bg-white/10 text-gray-200');
        const eu = (i === s.you) ? ' ⭐' : '';
        return '<div class="' + cls + ' px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">' + esc(p.name) + eu + ' · ' + p.count + '</div>';
    }).join('');
    return '<div class="flex flex-wrap gap-2 justify-center mb-4">' + chips + '</div>';
}

async function escolher(attr) {
    if (ocupado) return; ocupado = true;
    if (window.SOM) SOM.motor();
    const fd = new FormData(); fd.append('token', meuToken); fd.append('attr', attr);
    try { await fetch('/game/' + CODE + '/choose', { method: 'POST', body: fd }); } catch (e) {}
    ocupado = false; ultimaAssinatura = ''; atualizar();
}
async function proxima() {
    if (ocupado) return; ocupado = true;
    try { await fetch('/game/' + CODE + '/next', { method: 'POST' }); } catch (e) {}
    ocupado = false; ultimaAssinatura = ''; atualizar();
}
async function comecar() {
    if (ocupado) return; ocupado = true;
    const fd = new FormData(); fd.append('token', meuToken);
    try { const r = await fetch('/game/' + CODE + '/start', { method: 'POST', body: fd }); const d = await r.json(); if (d.error) alert(d.error); } catch (e) {}
    ocupado = false; ultimaAssinatura = ''; atualizar();
}
function copiarLink() {
    const url = location.origin + '/jogo/' + CODE;
    if (navigator.share) navigator.share({ title: 'Duelo Super Trunfo', text: 'Bora duelar no Lucas Garage!', url: url });
    else { navigator.clipboard.writeText(url); alert('Link copiado! Mande pros seus amigos.'); }
}

function render(s) {
    const area = document.getElementById('area');
    document.getElementById('eu-sou').textContent = s.you >= 0 ? ('Jogador ' + (s.you + 1)) : 'Espectador';

    if (s.phase === 'lobby') {
        const lista = s.players.map(function (p) { return '<div class="bg-white/5 rounded-xl px-4 py-2 text-sm font-bold">🎮 ' + esc(p.name) + '</div>'; }).join('');
        let acao;
        if (s.isHost) {
            acao = s.nplayers >= 2
                ? '<button onclick="comecar()" class="w-full bg-garage-ferrari hover:bg-red-700 text-white font-bold px-6 py-4 rounded-2xl transition-all text-lg">▶ Começar duelo (' + s.nplayers + ' jogadores)</button>'
                : '<p class="text-gray-500 text-sm">Aguardando pelo menos 1 amigo entrar...</p>';
        } else {
            acao = '<p class="text-gray-400 text-sm">Você entrou! Aguardando o host começar...</p>';
        }
        area.innerHTML = '<div class="glass-card rounded-3xl p-6 text-center">' +
            '<p class="text-5xl mb-3">📲</p>' +
            '<p class="text-gray-300 font-bold mb-1">Sala de duelo aberta</p>' +
            '<p class="text-gray-500 text-xs mb-4">Mande o link para os amigos (até 6 jogadores).</p>' +
            '<button onclick="copiarLink()" class="w-full bg-white/10 hover:bg-white/20 border border-garage-ferrari/40 text-white font-bold px-4 py-3 rounded-2xl transition-all mb-4">🔗 Compartilhar link</button>' +
            '<div class="space-y-2 mb-4 text-left">' + lista + '</div>' + acao + '</div>';
        return;
    }
    if (s.phase === 'over') {
        const venceu = (s.winner === s.you);
        if (window.SOM) { (s.winner < 0) ? SOM.empate() : (venceu ? SOM.vitoria() : SOM.derrota()); }
        area.innerHTML = placarHTML(s) + '<div class="glass-card rounded-3xl p-8 text-center">' +
            '<p class="text-6xl mb-4">' + (venceu ? '🏆' : '🏁') + '</p>' +
            '<p class="font-display text-2xl font-bold mb-2">' + (venceu ? 'Você venceu!' : esc(s.winnerName) + ' venceu!') + '</p>' +
            '<a href="/super-trunfo" class="inline-block mt-4 bg-garage-ferrari hover:bg-red-700 text-white font-bold px-6 py-3 rounded-2xl transition-all">🔄 Novo duelo</a></div>';
        return;
    }
    if (s.phase === 'reveal' && s.last) {
        const venc = s.last.winner;
        const nomeVenc = venc >= 0 ? (s.players[venc] ? s.players[venc].name : ('Jogador ' + (venc + 1))) : null;
        let extra = '';
        if (s.last.motivo === 'super_trunfo') extra = ' 👑 SUPER TRUNFO!';
        else if (s.last.motivo === 'letra_a') extra = ' 🅰️ Carta A derrubou o Super Trunfo!';
        const banner = (venc < 0)
            ? '<div class="text-center font-display font-bold text-lg py-3 rounded-2xl mb-3 bg-white/10 text-gray-200">🤝 Empate! Cartas pro monte.</div>'
            : '<div class="text-center font-display font-bold text-lg py-3 rounded-2xl mb-3 bg-garage-ferrari/20 text-garage-ferrari border border-garage-ferrari/40">🏁 ' + esc(nomeVenc) + ' venceu a rodada!' + extra + '</div>';
        const cards = s.last.plays.map(function (pl) {
            return '<div><p class="text-center text-[10px] text-gray-500 mb-1 uppercase tracking-widest">' + esc(pl.name) + '</p>' +
                cartaHTML(pl.card, false, s.last.attr, pl.i === venc) + '</div>';
        }).join('');
        area.innerHTML = placarHTML(s) + banner +
            '<div class="grid grid-cols-2 gap-3">' + cards + '</div>' +
            '<button onclick="proxima()" class="w-full mt-4 bg-garage-ferrari hover:bg-red-700 text-white font-bold py-3 rounded-2xl transition-all">Próxima rodada →</button>';
        return;
    }
    // playing
    const souChooser = (s.you === s.chooser);
    let html = placarHTML(s);
    if (s.you < 0 || (s.players[s.you] && s.players[s.you].out)) {
        html += '<p class="text-center text-gray-500 py-6">Você está assistindo. Vez de <span class="text-garage-ferrari font-bold">' + esc(s.chooserName) + '</span>.</p>';
        area.innerHTML = html; return;
    }
    html += '<p class="text-center font-bold mb-3">' + (souChooser ? 'Sua vez — <span class="text-garage-ferrari">escolha um atributo</span>' : 'Aguardando <span class="text-garage-ferrari">' + esc(s.chooserName) + '</span> escolher...') + '</p>';
    html += cartaHTML(s.yourCard, souChooser, null, false);
    area.innerHTML = html;
}

async function atualizar() {
    try {
        const r = await fetch('/game/' + CODE + '/state?token=' + encodeURIComponent(meuToken));
        const s = await r.json();
        if (s.error) return;
        const assin = s.phase + '|' + s.chooser + '|' + s.rodada + '|' + s.nplayers + '|' +
            s.players.map(function (p) { return p.count + (p.out ? 'x' : ''); }).join(',') + '|' + (s.last ? s.last.attr : '') + '|' + s.isHost;
        if (assin !== ultimaAssinatura) { ultimaAssinatura = assin; render(s); }
    } catch (e) {}
}

async function entrar() {
    if (!meuToken) {
        const fd = new FormData(); fd.append('token', '');
        try {
            const r = await fetch('/game/' + CODE + '/join', { method: 'POST', body: fd });
            const d = await r.json();
            if (d.token) { meuToken = d.token; localStorage.setItem('gt_' + CODE, meuToken); }
        } catch (e) {}
    }
    atualizar();
    setInterval(atualizar, 1500);
}
entrar();
</script>
{% endblock %}
