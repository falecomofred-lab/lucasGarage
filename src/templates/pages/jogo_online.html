{% extends "base.html" %}

{% block title %}Duelo Online · Lucas Garage{% endblock %}

{% block content %}
<div class="w-full px-4 py-8 sm:px-6">
    <div class="max-w-md mx-auto">

        <header class="text-center mb-6">
            <p class="text-garage-ferrari text-[11px] font-bold tracking-[0.35em] uppercase mb-2">Duelo Online</p>
            <h1 class="font-display text-3xl font-bold">SUPER <span class="text-garage-ferrari">TRUNFO</span></h1>
            <p class="text-xs text-gray-500 mt-1">Sala <span class="text-white font-bold">{{ code }}</span> · você é o <span id="eu-sou" class="text-garage-ferrari font-bold">—</span></p>
        </header>

        <div id="area" class="min-h-[300px]">
            <p class="text-center text-gray-500 py-16">Conectando...</p>
        </div>
    </div>
</div>

<script>
const CODE = "{{ code }}";
let meuToken = localStorage.getItem('gt_' + CODE) || "";
let euSou = 0;
let ultimaAssinatura = "";
let ocupado = false;

const ATTRS = [
    { key: 'velocidade', label: '⚡ Velocidade', dir: 'high' },
    { key: 'potencia',   label: '🔧 Potência',   dir: 'high' },
    { key: 'ano',        label: '📅 Ano',         dir: 'low'  },
    { key: 'raridade',   label: '💎 Raridade',    dir: 'high' },
];

function fotoHTML(c) {
    if (c && c.photo) return '<img src="' + c.photo + '" class="absolute inset-0 w-full h-full object-cover">';
    return '<div class="absolute inset-0 flex items-center justify-center font-display text-4xl font-bold text-white/15">1:32</div>';
}
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function cartaHTML(c, interativo, destaque) {
    if (!c) return '';
    const linhas = ATTRS.map(function (a) {
        const val = c.stats[a.key];
        const hl = (destaque === a.key);
        if (interativo) {
            return '<button onclick="escolher(\'' + a.key + '\')" class="w-full flex items-center justify-between px-4 py-3 rounded-xl bg-white/5 hover:bg-garage-ferrari active:scale-95 transition-all text-left">' +
                '<span class="text-sm font-bold">' + a.label + '</span><span class="font-display text-lg font-bold">' + val + '</span></button>';
        }
        return '<div class="flex items-center justify-between px-4 py-2.5 rounded-xl ' + (hl ? 'bg-garage-ferrari/25 border border-garage-ferrari' : 'bg-white/5') + '">' +
            '<span class="text-sm font-bold">' + a.label + '</span><span class="font-display text-lg font-bold ' + (hl ? 'text-garage-ferrari' : '') + '">' + val + '</span></div>';
    }).join('');
    const logo = c.logo ? '<div class="absolute bottom-2 left-2 w-9 h-9 rounded-full bg-white/95 flex items-center justify-center p-1"><img src="' + c.logo + '" class="max-w-full max-h-full object-contain" onerror="this.parentElement.style.display=\'none\'"></div>' : '';
    return '<div class="rounded-3xl overflow-hidden border border-white/10 bg-garage-dark shadow-xl">' +
        '<div class="relative w-full aspect-[4/3] bg-gradient-to-br from-garage-graphite to-black overflow-hidden">' + fotoHTML(c) + logo +
        '<div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div></div>' +
        '<div class="p-4"><h3 class="font-display text-lg font-bold line-clamp-1">' + esc(c.name) + '</h3>' +
        '<p class="text-xs text-gray-400 uppercase tracking-wider mb-3">' + esc(c.mfr || '—') + '</p>' +
        '<div class="space-y-2">' + linhas + '</div></div></div>';
}

function placarHTML(s) {
    return '<div class="flex items-center justify-between mb-3 text-center text-xs">' +
        '<div><p class="text-gray-500 uppercase tracking-widest">Você (J' + s.you + ')</p><p class="font-display text-xl font-bold">' + (s.you===1?s.counts.p1:s.counts.p2) + '</p></div>' +
        '<div><p class="text-gray-500 uppercase tracking-widest">Rodada</p><p class="font-display text-lg font-bold text-garage-ferrari">' + s.rodada + '</p></div>' +
        '<div><p class="text-gray-500 uppercase tracking-widest">Oponente</p><p class="font-display text-xl font-bold">' + (s.you===1?s.counts.p2:s.counts.p1) + '</p></div></div>';
}

async function escolher(attr) {
    if (ocupado) return; ocupado = true;
    const fd = new FormData(); fd.append('token', meuToken); fd.append('attr', attr);
    try { await fetch('/game/' + CODE + '/choose', { method: 'POST', body: fd }); } catch (e) {}
    ocupado = false; ultimaAssinatura = ''; atualizar();
}
async function proxima() {
    if (ocupado) return; ocupado = true;
    try { await fetch('/game/' + CODE + '/next', { method: 'POST' }); } catch (e) {}
    ocupado = false; ultimaAssinatura = ''; atualizar();
}
function copiarLink() {
    const url = location.origin + '/jogo/' + CODE;
    if (navigator.share) { navigator.share({ title: 'Duelo Super Trunfo', text: 'Bora duelar no Lucas Garage!', url: url }); }
    else { navigator.clipboard.writeText(url); alert('Link copiado! Mande pro seu amigo.'); }
}

function render(s) {
    const area = document.getElementById('area');
    document.getElementById('eu-sou').textContent = s.you ? ('Jogador ' + s.you) : 'Espectador';

    if (s.phase === 'waiting') {
        area.innerHTML = '<div class="glass-card rounded-3xl p-8 text-center">' +
            '<p class="text-5xl mb-4">📲</p><p class="text-gray-300 mb-2 font-bold">Aguardando o amigo entrar...</p>' +
            '<p class="text-gray-500 text-sm mb-6">Mande o link para o seu adversário. Assim que ele abrir, o duelo começa.</p>' +
            '<button onclick="copiarLink()" class="bg-garage-ferrari hover:bg-red-700 text-white font-bold px-6 py-3 rounded-2xl transition-all">🔗 Compartilhar link do duelo</button></div>';
        return;
    }
    if (s.phase === 'over') {
        const venceu = (s.winner === s.you);
        area.innerHTML = '<div class="glass-card rounded-3xl p-8 text-center">' +
            '<p class="text-6xl mb-4">' + (s.winner === 0 ? '🤝' : (venceu ? '🏆' : '😢')) + '</p>' +
            '<p class="font-display text-2xl font-bold mb-2">' + (s.winner === 0 ? 'Empate!' : (venceu ? 'Você venceu!' : 'Você perdeu!')) + '</p>' +
            '<a href="/super-trunfo" class="inline-block mt-4 bg-garage-ferrari hover:bg-red-700 text-white font-bold px-6 py-3 rounded-2xl transition-all">🔄 Novo duelo</a></div>';
        return;
    }
    if (s.phase === 'reveal' && s.last) {
        const venc = s.last.winner;
        const banner = (venc === 0)
            ? '<div class="text-center font-display font-bold text-lg py-3 rounded-2xl mb-3 bg-white/10 text-gray-200">🤝 Empate! Cartas pro monte.</div>'
            : '<div class="text-center font-display font-bold text-lg py-3 rounded-2xl mb-3 bg-garage-ferrari/20 text-garage-ferrari border border-garage-ferrari/40">🏁 Jogador ' + venc + ' venceu a rodada!</div>';
        area.innerHTML = placarHTML(s) + banner +
            '<div class="grid grid-cols-2 gap-3">' +
            '<div><p class="text-center text-xs text-gray-500 mb-1 uppercase tracking-widest">J1</p>' + cartaHTML(s.last.c1, false, s.last.attr) + '</div>' +
            '<div><p class="text-center text-xs text-gray-500 mb-1 uppercase tracking-widest">J2</p>' + cartaHTML(s.last.c2, false, s.last.attr) + '</div></div>' +
            '<button onclick="proxima()" class="w-full mt-4 bg-garage-ferrari hover:bg-red-700 text-white font-bold py-3 rounded-2xl transition-all">Próxima rodada →</button>';
        return;
    }
    // playing
    const souChooser = (s.you === s.chooser);
    let html = placarHTML(s);
    html += '<p class="text-center font-bold mb-3">' + (souChooser ? 'Sua vez — <span class="text-garage-ferrari">escolha um atributo</span>' : 'Aguardando o <span class="text-garage-ferrari">Jogador ' + s.chooser + '</span> escolher...') + '</p>';
    html += cartaHTML(s.yourCard, souChooser, null);
    area.innerHTML = html;
}

async function atualizar() {
    try {
        const r = await fetch('/game/' + CODE + '/state?token=' + encodeURIComponent(meuToken));
        const s = await r.json();
        if (s.error) return;
        euSou = s.you;
        const assin = s.phase + '|' + s.chooser + '|' + s.rodada + '|' + s.counts.p1 + '|' + s.counts.p2 + '|' + (s.last ? s.last.attr : '');
        if (assin !== ultimaAssinatura) { ultimaAssinatura = assin; render(s); }
    } catch (e) {}
}

async function entrar() {
    if (!meuToken) {
        const fd = new FormData(); fd.append('token', '');
        try {
            const r = await fetch('/game/' + CODE + '/join', { method: 'POST', body: fd });
            const d = await r.json();
            if (d.token) { meuToken = d.token; localStorage.setItem('gt_' + CODE, meuToken); }
        } catch (e) {}
    }
    atualizar();
    setInterval(atualizar, 1500);
}
entrar();
</script>
{% endblock %}
